# 第 13–24 周离线毕业流水线配置。合成数据只验证流程，不代表策略有效。
start_date: "2020-01-02"
end_date: "2022-04-20"
seed: 17

data:
  source: synthetic
  n_days: 600
  n_assets: 40

universe:
  min_listing_days: 60
  exclude_st: true
  exclude_suspended: true

factors:
  amihud_window: 20
  ic_window: 60
  decay_lags: 10

portfolio:
  max_weight: 0.05
  max_industry_deviation: 0.05
  max_turnover: 0.30
  rebalance: monthly

backtest:
  commission: 0.0003
  stamp_duty: 0.0005
  slippage: 0.0005
  execution_lag: 1

validation:
  min_train_dates: 180
  train_window_dates: 360
  label_horizon_dates: 20
  retrain_every: 20
  model: ridge
  purge_dates: 20
  embargo_dates: 5

execution:
  initial_cash: 1000000
  lot_size: 100
  max_volume_participation: 0.10
  impact_coefficient: 0.10

monitor:
  max_drawdown: 0.20
  max_psi: 0.25
